<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gato Piloto</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #ui-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #volume-btn {
            pointer-events: auto;
            background: rgba(255,255,255,0.08);
            color: white;
            border: 2px solid rgba(255,255,255,0.12);
            min-width: 44px;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        #volume-btn:active {
            transform: scale(0.96);
            background: rgba(255,255,255,0.12);
        }

        #mobile-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
        }

        #joystick-zone {
            width: 120px;
            height: 120px;
            pointer-events: auto;
        }

        #shoot-btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 0, 0, 0.5);
            border-radius: 50%;
            border: 4px solid white;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #shoot-btn:active {
            background: rgba(255, 0, 0, 0.8);
            transform: scale(0.95);
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            z-index: 10;
        }

        .btn {
            padding: 15px 40px;
            font-size: 24px;
            background: #ff9800;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            pointer-events: auto;
        }

        .hidden {
            display: none !important;
        }

        #lives-container {
            display: flex;
            gap: 5px;
        }

        .heart {
            color: #ff4d4d;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-overlay">
            <div id="score">Score: 0</div>
            <div id="lives-container"></div>
            <div id="ui-controls" style="pointer-events:auto; align-items:center; gap:10px;">
                <button id="shield-btn" class="btn" style="padding:8px 12px; font-size:18px; border-radius:12px; background:rgba(0,0,0,0.25); box-shadow:none;">
                    🛡️
                </button>
                <div id="shield-bar" style="width:110px; height:12px; background:rgba(255,255,255,0.12); border-radius:8px; overflow:hidden; display:flex; align-items:center;">
                    <div id="shield-fill" style="height:100%; width:0%; background:linear-gradient(90deg,#4ee,#08f);"></div>
                </div>
                <button id="volume-btn" class="btn" style="padding:8px 12px; font-size:18px; border-radius:12px; background:rgba(0,0,0,0.4); box-shadow:none;">
                    🔊
                </button>
            </div>
        </div>

        <div id="start-screen">
            <h1>Gato Piloto</h1>
            <p>¡Defiende los cielos con el Capitán Miau!</p>
            <button class="btn" id="start-btn">DESPEGAR</button>
        </div>

        <div id="game-over-screen" class="hidden">
            <h1>¡MISIÓN FALLIDA!</h1>
            <p id="final-score">Puntaje: 0</p>
            <button class="btn" id="restart-btn">REINTENTAR</button>
        </div>

        <div id="mobile-controls">
            <div id="joystick-zone"></div>
            <div id="shoot-btn">FUEGO</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "nipplejs": "https://esm.sh/nipplejs"
            }
        }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
